<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes de Reserva</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; }

        .header { background-color: #d9d9d9; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .user-icon { width: 50px; height: 50px; background-color: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 3px solid #333; }
        .user-icon svg { width: 30px; height: 30px; }
        .menu-icon { background-color: #2196F3; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; position: relative; }
        .menu-icon svg { width: 24px; height: 24px; }
        .menu-dropdown { display: none; position: absolute; top: 60px; right: 0; background-color: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); padding: 10px; min-width: 200px; z-index: 100; }
        .menu-dropdown.active { display: block; }
        .menu-item { padding: 12px 20px; cursor: pointer; border-radius: 5px; background-color: #e0e0e0; font-weight: 500; color: #333; margin-bottom: 5px; }
        .menu-item:hover { background-color: #2196F3; color: white; }

        .container { padding: 40px; }
        .section-title { font-size: 32px; font-weight: bold; margin-bottom: 30px; }

        .inmuebles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .inmueble-card { background-color: white; border: 3px solid #4CAF50; border-radius: 8px; padding: 15px; position: relative; }
        .inmueble-card h3 { margin-bottom: 5px; }
        .inmueble-card p { margin-bottom: 8px; color: #555; }

        .reserva-list { margin-top: 10px; }
        .reserva-item { background-color: #f0f0f0; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .reserva-item span { margin-right: 10px; }
        .btn { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .btn-confirm { background-color: #4CAF50; }
        .btn-reject { background-color: #f44336; }
        .btn-volver {
            display: block;
            margin: 30px auto;
            text-align: center;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            width: 150px;
        }
        .btn-volver:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="user-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
            </div>
            <span th:text="${usuarioActual.nombre}">Nombre Usuario</span>
        </div>

        <div class="menu-icon" onclick="toggleMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
            <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-item"><a th:href="@{/usuarios/logout}">Cerrar sesión</a></div>
                <div class="menu-item"><a th:href="@{/inmuebles/registrar}">Registrar inmueble</a></div>
                <div class="menu-item"><a th:href="@{/propietario/solicitudes}">Solicitudes reserva</a></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="section-title">Solicitudes de Reserva</div>
        <div class="inmuebles-grid">

            <div th:if="${#lists.isEmpty(solicitudes)}">
                <p>No hay solicitudes de reserva pendientes.</p>
            </div>

            <div th:each="reserva : ${solicitudes}" class="inmueble-card">
                <h3 th:text="${reserva.inmueble.titulo}">Título Inmueble</h3>
                
                <p th:text="${reserva.inmueble.direccion}">Dirección</p>
                
                <div class="reserva-list">
                    <div class="reserva-item">
                        <span th:text="'Inquilino: ' + ${reserva.inquilino.nombre} + ' ' + ${reserva.inquilino.apellidos}"></span>
                        <span th:text="'Fechas: ' + ${reserva.fechaInicio} + ' → ' + ${reserva.fechaFin}"></span>
                        <div>
                            <form th:action="@{'/propietario/solicitudes/confirmar/' + ${reserva.id}}" method="post" style="display:inline">
                                <button type="submit" class="btn btn-confirm">Confirmar</button>
                            </form>
                            <form th:action="@{'/propietario/solicitudes/rechazar/' + ${reserva.id}}" method="post" style="display:inline">
                                <button type="submit" class="btn btn-reject">Rechazar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <a th:href="@{/propietario/inicio}" class="btn-volver">Cerrar Solicitudes</a>
    </div>

    <script>
        function toggleMenu() {
            const dropdown = document.getElementById('menuDropdown');
            dropdown.classList.toggle('active');
        }

        document.addEventListener('click', function(event) {
            const menuIcon = event.target.closest('.menu-icon');
            if (!menuIcon) document.getElementById('menuDropdown').classList.remove('active');
        });
    </script>
</body>
</html>
