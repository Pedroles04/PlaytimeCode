<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background: white;
      padding: 30px 40px;
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
      width: 350px;
      text-align: center;
    }
    h2 { margin-bottom: 20px; color: #1e3a8a; }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .error {
      color: red;
      font-size: 14px;
      margin-top: 10px;
    }
    .link {
      display: block;
      margin-top: 15px;
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="login-container">
  <h2>Iniciar sesión</h2>

  <form th:action="@{/usuarios/login}" method="post">
    <input type="text" name="login" placeholder="Usuario" required>
    <input type="password" name="pass" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
  </form>

  <p class="error" th:text="${error}"></p>

  <!-- ✅ Enlace claro para registro -->
  <a href="/usuarios/registro" class="link">¿No tienes cuenta? Regístrate aquí</a>
</div>

</body>
</html>
